<div class="lf-form page-wrapper">

  <!-- PAGE HEADER -->
  <header class="page-header" role="banner">
    <div class="page-header-inner">
      <div>
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a routerLink="/">Дома</a>
          <span class="sep" aria-hidden="true">›</span>
          <a routerLink="/lost-found">Изгубено и Најдено</a>
          <span class="sep" aria-hidden="true">›</span>
          <span class="current" aria-current="page">Нов оглас</span>
        </nav>
        <h1 class="page-title">
          <ng-container *ngIf="listing.status === 'Изгубено'"  >Пријави <em>изгубено</em> милениче</ng-container>
          <ng-container *ngIf="listing.status === 'Најдено'">Пријави <em>најдено</em> милениче</ng-container>
        </h1>
      </div>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="lff-content" role="main">
    
    <form class="lff-form surface-raised" #f="ngForm" (ngSubmit)="submitListing()">
      <!-- Status toggle -->
      <div class="lff-status" role="group" aria-label="Изберете статус на огласот">
        <button  (click)="setStatus('izgubeno')" class="lff-status__btn"
                [class.lff-status__btn--lost]="listing.status === 'Изгубено'"
                type="button"
                [attr.aria-pressed]="listing.status === 'Изгубено'">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          Изгубено
        </button>
        <button (click)="setStatus('najdeno')" class="lff-status__btn"
                [class.lff-status__btn--found]="listing.status === 'Најдено'"
                type="button"
                [attr.aria-pressed]="listing.status === 'Најдено'">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Најдено
        </button>
      </div>

      <!-- Vid i Ime -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="lf-type">Вид на милениче *</label>
          <select class="form-select" id="lf-type" [(ngModel)]="listing.petType" name="petType" required>
            <option value="">— Изберете —</option>
            <option value="Куче">Куче</option>
            <option value="Мачка">Мачка</option>
            <option value="Птица">Птица</option>
            <option value="Друго">Друго</option>
          </select>
        </div>
        <div *ngIf="listing.status==='Изгубено'" class="form-group" >
          <label class="form-label" for="lf-name">Име *</label>
          <input class="form-input" id="lf-name" type="text"
                 placeholder="пр. Макс, Мица..."
                 [(ngModel)]="listing.name" name="name"/>
        </div>
      </div>

      <!-- Rasa i Boja -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="lf-breed">Раса *</label>
          <input class="form-input" id="lf-breed" type="text"
                 placeholder="пр. Лабрадор, Персиска..."
                 [(ngModel)]="listing.breed" name="breed" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="lf-color">Боја / Опис на изглед *</label>
          <input class="form-input" id="lf-color" type="text"
                 placeholder="пр. Кафеав со бела дамка..."
                 [(ngModel)]="listing.color" name="color" required/>
        </div>
      </div>

      <!-- Opis -->
      <div class="form-group">
        <label class="form-label" for="lf-desc">Опис *</label>
        <textarea class="form-textarea" id="lf-desc" rows="4"
                  placeholder="Детален опис: карактеристики, однесување, особени знаци..."
                  [(ngModel)]="listing.description" name="description" required></textarea>
      </div>

      <!-- Slika -->
      <div class="form-group">
        <label class="form-label" for="lf-image">Слика</label>
        <input class="form-input" id="lf-image" type="file" accept="image/*" (change)="onFileSelected($event)"
                name="image" />
        <div class="lff-preview" *ngIf="listing.image" role="img" [attr.aria-label]="'Преглед на слика'">
          <img [src]="listing.image" alt="Преглед на слика"
               onerror="this.src='https://placehold.co/600x180/F5F4F0/9E8B7A?text=Pet'"/>
        </div>
      </div>

      <!-- Lokacija i Grad -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="lf-location">Локација *</label>
          <input class="form-input" id="lf-location" type="text"
                 placeholder="пр. Центар, кај пазарот..."
                 [(ngModel)]="listing.location" name="location" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="lf-city">Град *</label>
          <select class="form-select" id="lf-city" [(ngModel)]="listing.city" name="city" required>
            <option value="">— Изберете —</option>
            <option value="Скопје">Скопје</option>
            <option value="Битола">Битола</option>
            <option value="Охрид">Охрид</option>
            <option value="Тетово">Тетово</option>
            <option value="Куманово">Куманово</option>
            <option value="Струмица">Струмица</option>
            <option value="Друго">Друго</option>
          </select>
        </div>
      </div>

      <!-- Datum -->
      <div class="form-group">
        <label class="form-label" for="lf-date">Датум *</label>
        <input class="form-input" id="lf-date" type="date" [(ngModel)]="listing.date" name="date" required/>
      </div>

      <!-- Kontakt divider -->
      <div class="divider-label" role="separator">
        <span>Контакт информации</span>
      </div>

      <!-- Kontakt -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="lf-cname">Ваше име *</label>
          <input class="form-input" id="lf-cname" type="text"
                 placeholder="Вашето име и презиме"
                 [(ngModel)]="listing.contactName" name="contactName"
                 autocomplete="name" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="lf-phone">Телефон *</label>
          <input class="form-input" id="lf-phone" type="tel"
                 placeholder="07x xxx xxx"
                 [(ngModel)]="listing.contactPhone" name="contactPhone"
                 autocomplete="tel" required/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="lf-email">E-пошта (опционално)</label>
        <input class="form-input" id="lf-email" type="email"
               placeholder="vasa@email.com"
               [(ngModel)]="listing.contactEmail" name="contactEmail"
               autocomplete="email"/>
      </div>

      <!-- Actions -->
      <div class="lff-actions">
        <button class="btn btn-ghost btn-sm"
                type="button"
                (click)="cancel()"
                aria-label="Откажи и врати се назад">
          Откажи
        </button>
        <button class="btn btn-ghost btn-sm"
                type="button"
                (click)="resetForm()"
                aria-label="Ресетирај ја формата">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 105.04-8.49"/>
          </svg>
          Ресетирај
        </button>
        <button class="btn lff-submit"
                [class.lff-submit--lost]="listing.status === 'Изгубено'"
                [class.lff-submit--found]="listing.status === 'Најдено'"
                type="submit"
                [disabled]="f.invalid"
                [attr.aria-label]="'Пријави ' + listing.status + ' милениче'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          {{ listing.status === 'Изгубено' ? 'Пријави Изгубено' : 'Пријави Најдено' }}
        </button>
      </div>

    </form>
    <div *ngIf="submitted" class="success-box">
        ✔ Успешно пријавен оглас!
    </div>
  </main>
</div>
