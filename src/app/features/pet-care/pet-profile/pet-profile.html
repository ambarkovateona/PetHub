<div class="pet-profile page-wrapper">

  <!-- PAGE HEADER -->
  <header class="page-header" role="banner">
    <div class="page-header-inner">
      <div>
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a routerLink="/">Дома</a>
          <span class="sep" aria-hidden="true">›</span>
          <a routerLink="/pet-care">Pet Care</a>
          <span class="sep" aria-hidden="true">›</span>
          <span class="current" aria-current="page">
            {{ isEditMode ? 'Уреди профил' : 'Ново милениче' }}
          </span>
        </nav>
        <h1 class="page-title">
          <ng-container *ngIf="isEditMode">Уреди го <em>профилот</em></ng-container>
          <ng-container *ngIf="!isEditMode">Додај <em>ново милениче</em></ng-container>
        </h1>
      </div>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="pp-content" role="main">
    <div class="pp-form surface-raised">

      <!-- Vid i Ime -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="pet-name">Ime на милениченото</label>
          <input class="form-input"
                 id="pet-name"
                 type="text"
                 placeholder="пр. Ares, Mija..."
                 [(ngModel)]="pet.name"
                 autocomplete="off"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="pet-type">Вид</label>
          <select class="form-select" id="pet-type" [(ngModel)]="pet.type">
            <option value="Куче">Куче</option>
            <option value="Мачка">Мачка</option>
            <option value="Птица">Птица</option>
            <option value="Друго">Друго</option>
          </select>
        </div>
      </div>

      <!-- Rasa i Pol -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="pet-breed">Раса</label>
          <input class="form-input"
                 id="pet-breed"
                 type="text"
                 placeholder="пр. Golden Retriever..."
                 [(ngModel)]="pet.breed"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="pet-gender">Пол</label>
          <select class="form-select" id="pet-gender" [(ngModel)]="pet.gender">
            <option value="Машко">Машко</option>
            <option value="Женско">Женско</option>
          </select>
        </div>
      </div>

      <!-- Datum i Tezina -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="pet-birth">Датум на раѓање</label>
          <input class="form-input"
                 id="pet-birth"
                 type="date"
                 [(ngModel)]="pet.birthDate"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="pet-weight">Тежина (kg)</label>
          <input class="form-input"
                 id="pet-weight"
                 type="number"
                 placeholder="пр. 12.5"
                 [(ngModel)]="pet.weight"
                 min="0"
                 step="0.1"/>
        </div>
      </div>

      <!-- Slika -->
      <div class="form-group">
        <label class="form-label" for="pet-image">URL на слика</label>
        <input class="form-input"
               id="pet-image"
               type="url"
               placeholder="https://..."
               [(ngModel)]="pet.image"/>
        <div class="pp-preview" *ngIf="pet.image" role="img" [attr.aria-label]="'Преглед на слика за ' + pet.name">
          <img [src]="pet.image"
               [alt]="pet.name || 'Преглед на слика'"
               onerror="this.src='https://placehold.co/600x200/F5F4F0/9E8B7A?text=Pet'"/>
        </div>
      </div>

      <!-- Divider -->
      <div class="divider-label" role="separator">
        <span>Контакт информации</span>
      </div>

      <!-- Actions -->
      <div class="pp-actions">
        <button class="btn btn-ghost btn-sm"
                type="button"
                (click)="cancel()"
                aria-label="Откажи и врати се назад">
          Откажи
        </button>
        <button class="btn btn-primary"
                type="submit"
                (click)="savePet()"
                [attr.aria-label]="isEditMode ? 'Зачувај ги промените' : 'Додај милениче'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
